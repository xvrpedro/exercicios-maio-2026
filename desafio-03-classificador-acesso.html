<!-- Desafio 03 — Classificador de Acesso
Solicite ao usuário sua idade, se possui cadastro e se a mensalidade está paga usando prompt. Normalize as respostas com .toLowerCase() e exiba o resultado seguindo as regras:

Se idade menor que 18 AND NOT possui cadastro: exiba "Acesso negado — menor sem cadastro"
Se idade maior ou igual a 18 AND possui cadastro AND mensalidade paga: exiba "Acesso liberado"
Se possui cadastro AND NOT mensalidade paga: exiba "Acesso bloqueado — mensalidade atrasada"
Qualquer outro caso: exiba "Acesso negado" -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador Acesso</title>
</head>
<body>
<script>
    let idade = Number(prompt('Qual a sua idade?'));
    // temCadastro
    let tC = prompt('Possui cadastro? Se sim, insira: sim.');
    let mensalidade = prompt('Mensalidade paga? Se sim, insira: sim.');
    // temCadastroNormalizado
    let tCN = tC.toLowerCase(); // vira "sim"
    let mN = mensalidade.toLowerCase(); // vira "sim"

    if (idade >= 18 && tCN == 'sim' && mN == 'sim') {
        document.write('Acesso liberado')
    }
    
    else if (idade >= 18 && tCN == 'sim' && mN != 'sim') {
        document.write('Acesso bloqueado — mensalidade atrasada')
    }

    else if (idade < 18 && tC != 'sim') {
        document.write('Acesso negado — menor sem cadastro')
    }

    else {
        document.write('Acesso negado.')
    }
</script>
</body>
</html>
